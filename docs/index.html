<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Hunt Agent | Pankaja</title>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2332; --accent: #3b82f6; --green: #22c55e;
      --text: #e2e8f0; --muted: #94a3b8; --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { padding: 1.5rem 1rem; max-width: 920px; margin: 0 auto; border-bottom: 1px solid var(--border); }
    h1 { font-size: 1.5rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .stats { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.9rem; font-size: 0.85rem; }
    .stat strong { color: var(--accent); font-size: 1.1rem; display: block; }
    main { max-width: 920px; margin: 0 auto; padding: 1rem; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 1.25rem 0 0.6rem; }
    .job { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
    .job.new { border-color: var(--green); }
    .job-head { display: flex; justify-content: space-between; gap: 0.5rem; }
    .job h2 { font-size: 1rem; font-weight: 600; }
    .score { background: #1e3a5f; color: #93c5fd; font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 999px; }
    .company { color: var(--accent); font-size: 0.9rem; }
    .meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
    .summary { font-size: 0.82rem; margin-top: 0.6rem; color: var(--muted); border-left: 3px solid var(--accent); padding-left: 0.6rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .btn {
      display: inline-block; padding: 0.45rem 0.85rem; border-radius: 6px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer;
    }
    .btn-resume { background: var(--green); color: #052e16; }
    .btn-apply { background: var(--accent); color: #fff; }
    .btn-copy { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .cover {
      display: none; margin-top: 0.75rem; background: #0c1220; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem; font-size: 0.78rem; white-space: pre-wrap; max-height: 280px; overflow-y: auto;
    }
    .cover.open { display: block; }
    .empty, .loading { text-align: center; color: var(--muted); padding: 3rem 1rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 2rem 1rem; border-top: 1px solid var(--border); margin-top: 1rem; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Job Hunt Agent</h1>
    <p class="sub">DevOps · Kubernetes · Cloud · IAM — India or Remote · last 24h · tailored resume + cover letter</p>
    <div class="stats">
      <div class="stat"><strong id="total">—</strong> jobs (24h)</div>
      <div class="stat"><strong id="newCount">—</strong> new today</div>
      <div class="stat"><strong id="updated">—</strong> last scan</div>
    </div>
  </header>
  <main><div id="content" class="loading">Loading…</div></main>
  <footer>
    Auto-runs every 6h on GitHub Actions ·
    <a href="https://github.com/Pankajajagdish/job-hunt-agent/actions">Run now</a>
  </footer>
  <script>
    function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
    function fmtDate(iso) {
      if (!iso) return "—";
      try { return new Date(iso).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" }); }
      catch { return iso; }
    }
    function renderJob(job, isNew, idx) {
      const resume = job.resume_url ? `<a class="btn btn-resume" href="${escapeHtml(job.resume_url)}" download>⬇ Tailored Resume</a>` : "";
      const coverId = "cover-" + idx;
      const hasCover = job.cover_letter || job.cover_letter_url;
      const coverBtn = hasCover ? `<button class="btn btn-copy" onclick="toggleCover('${coverId}')">View Cover Letter</button>
        <button class="btn btn-copy" onclick="copyCover('${coverId}')">Copy Cover Letter</button>` : "";
      return `<article class="job${isNew ? " new" : ""}">
        <div class="job-head">
          <div>
            <h2>${escapeHtml(job.title)}</h2>
            <div class="company">${escapeHtml(job.company)}</div>
            <div class="meta">${escapeHtml(job.location)} · ${escapeHtml(job.source)} · Posted ${fmtDate(job.posted_at)}</div>
          </div>
          <span class="score">${job.match_score}% match</span>
        </div>
        ${job.tailored_summary ? `<div class="summary">${escapeHtml(job.tailored_summary)}</div>` : ""}
        <div class="actions">
          ${resume}
          <a class="btn btn-apply" href="${escapeHtml(job.url)}" target="_blank" rel="noopener">Apply on Site →</a>
          ${coverBtn}
        </div>
        ${hasCover ? `<pre class="cover" id="${coverId}">${escapeHtml(job.cover_letter || "Loading…")}</pre>` : ""}
      </article>`;
    }
    function toggleCover(id) { document.getElementById(id).classList.toggle("open"); }
    function copyCover(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => alert("Cover letter copied!"));
    }
    async function load() {
      try {
        const data = await (await fetch("jobs_feed.json?t=" + Date.now())).json();
        document.getElementById("total").textContent = data.total ?? 0;
        document.getElementById("newCount").textContent = data.new_count ?? 0;
        document.getElementById("updated").textContent = fmtDate(data.updated_at);
        const el = document.getElementById("content");
        if (!data.jobs?.length) {
          el.className = "empty";
          el.innerHTML = "<p>No jobs in the last 24 hours yet. Run GitHub Actions to scan.</p>";
          return;
        }
        el.className = "";
        const newIds = new Set((data.new_jobs || []).map(j => j.id));
        let html = "", i = 0;
        if (data.new_jobs?.length) {
          html += `<div class="section-title">New — resume & cover letter ready</div>`;
          html += data.new_jobs.map(j => renderJob(j, true, i++)).join("");
        }
        html += `<div class="section-title">All last-24h matches</div>`;
        html += data.jobs.map(j => renderJob(j, newIds.has(j.id), i++)).join("");
        el.innerHTML = html;
        // Load cover letters from file if not inline
        for (const job of data.jobs) {
          if (!job.cover_letter && job.cover_letter_url) {
            fetch(job.cover_letter_url).then(r => r.text()).then(t => {
              const pre = document.querySelector(`#cover-${data.jobs.indexOf(job)}`);
              if (pre) pre.textContent = t;
            }).catch(() => {});
          }
        }
      } catch {
        document.getElementById("content").innerHTML = `<div class="empty">Run GitHub Actions first.</div>`;
      }
    }
    load();
  </script>
</body>
</html>
