name: Job Hunt Agent

on:
  schedule:
    # Every 6 hours — GitHub Actions cron uses UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: job-hunt-agent
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-agent.txt

      - name: Install LibreOffice (DOCX → PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Ensure job-alert label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "job-alert" --color "0E8A16" --description "New matching job alert" 2>/dev/null || true

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RSS_FEED_URLS: ${{ secrets.RSS_FEED_URLS }}
          MIN_MATCH_SCORE: "30"
          ISSUE_MIN_SCORE: "40"
          DAILY_APPLY_GOAL: "50"
        run: python scripts/github_agent.py

      - name: Commit job feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json docs/jobs_feed.json docs/applications/
          git diff --staged --quiet || git commit -m "chore: update job feed [skip ci]"
          git push
